# Config Streamlit du projet.
# fileWatcherType = "none" : désactive l'auto-reload, qui parcourt sinon tous les
# sous-modules de `transformers` et inonde la console de tracebacks `torchvision`
# (dépendance non installée, inutile ici : on ne fait que des embeddings de texte).
[server]
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[theme]
# Palette pro cohérente : accent indigo (UI : boutons, sélection) distinct du
# bleu/vert/violet des 3 architectures (séries de données). Fond clair, texte ardoise.
primaryColor = "#4f46e5"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f5f9"
textColor = "#0f172a"
font = "sans serif"
