# What Prometheus pulls, and how often. It HTTP-GETs each target's /metrics on a timer.
global:
  scrape_interval: 15s

scrape_configs:
  # vLLM serving metrics: request rate, latency histograms, tokens, running/waiting queue.
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8000"]

  # GPU hardware metrics from the DCGM exporter.
  - job_name: gpu
    static_configs:
      - targets: ["dcgm-exporter:9400"]
