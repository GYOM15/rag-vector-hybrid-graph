name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Les tests chargent les modules par chemin de fichier : seules des libs
      # légères suffisent (snowballstemmer, spaCy + petit modèle), pas
      # torch/faiss/sentence-transformers — d'où une CI qui reste rapide.
      - name: Install test dependencies
        run: |
          pip install pytest ruff snowballstemmer "spacy>=3.8,<3.9" click
          pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl

      - name: Lint (ruff)
        run: ruff check .
        continue-on-error: true

      - name: Unit tests
        run: pytest -q
